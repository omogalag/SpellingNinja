<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/omogalag/OTTO/main/favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Spelling Ninja</title>
  <style>
    :root {
      --bg: #0b1120;
      --card: #111827;
      --primary: #eed93f;
      --text: #e5eefc;
      --muted: #f5f3b9;
      --border: #23314d;
      --accent: #172036;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #060b16 0%, var(--bg) 100%);
      color: var(--text);
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
    }

    header {
      padding: 18px 16px 10px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.9rem, 7vw, 2.8rem);
      color: var(--primary);
      line-height: 1.1;
    }

    header p {
      margin: 8px auto 0;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(0.95rem, 3.8vw, 1rem);
      line-height: 1.5;
    }

    .container {
      width: min(1040px, calc(100% - 20px));
      margin: 0 auto 28px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      line-height: 1.2;
    }

    .panel p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: clamp(0.95rem, 3.8vw, 1rem);
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(238, 217, 63, 0.12);
      color: var(--primary);
      border: 1px solid rgba(238, 217, 63, 0.22);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.88rem;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      width: 100%;
    }

    .word-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    label {
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 700;
    }

    button,
    select {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--border);
      background: var(--primary);
      color: #000;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: clamp(1rem, 4.2vw, 1.08rem);
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      white-space: normal;
      word-break: break-word;
    }

    button {
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    .alphabet-tools {
      position: static;
      background: transparent;
      border: 0;
      border-radius: 18px;
      padding: 0;
      margin-bottom: 18px;
      width: 100%;
      backdrop-filter: none;
    }

    .alphabet-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .flip-card {
      perspective: 1000px;
      height: 112px;
      cursor: pointer;
    }

    .word-card {
      width: 100%;
      max-width: 420px;
      height: 180px;
      margin: 0 auto;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
    }

    .flip-front {
      background: #0f172a;
      color: var(--primary);
      font-size: clamp(2.2rem, 8vw, 3rem);
    }

    .flip-back {
      background: var(--primary);
      color: #000;
      transform: rotateY(180deg);
      line-height: 1.4;
      font-size: clamp(1rem, 4.8vw, 1.3rem);
      padding: 14px;
    }

    .card-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }

    .card-main {
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      font-weight: 400;
      line-height: 1;
    }

    .card-sub {
      font-size: clamp(0.78rem, 3vw, 0.92rem);
      opacity: 0.82;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .word-front {
      font-size: clamp(2rem, 9vw, 3rem);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .word-back {
      letter-spacing: 1px;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      font-size: clamp(1rem, 4.8vw, 1.35rem);
    }

    .result-area {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .generated-wrap {
      display: grid;
      place-items: center;
      min-height: 200px;
      background: linear-gradient(180deg, #0d1528 0%, #131d33 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
    }

    .legend {
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
      line-height: 1.4;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (min-width: 641px) {
      .container {
        width: min(1100px, calc(100% - 32px));
        gap: 22px;
        margin-bottom: 40px;
      }

      .panel {
        padding: 22px;
      }

      .controls {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 12px;
        align-items: stretch;
      }

      .controls > * {
        flex: 1 1 220px;
        width: 100%;
      }

      .word-controls {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 12px;
      }

      .word-controls select {
        min-width: 220px;
      }

      .alphabet-grid {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 14px;
      }

      .flip-card {
        height: 132px;
      }

      .word-card {
        height: 170px;
      }
    }
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px 10px 0;

}

.tab {
  background: #1a2440;
  color: #eed93f;
  border: 1px solid var(--border);
}

.tab.active {
  background: var(--primary);
  color: #000;
}

/* Móvil */
@media (max-width: 640px) {
  .tab {
    flex: 1;
  }
}

/* Computador */
@media (min-width: 641px) {
  .tabs {
    justify-content: center;
    max-width: 520px;
    margin: 0 auto;
  }

  .tab {
    flex: 0 0 550px;
  }
}
  </style>
</head>
<body>
  <header>
    <div class="title-wrap">
      <img src="https://raw.githubusercontent.com/omogalag/SpellingNinja/refs/heads/main/Spelling_Ninja_Small.png" alt="Ninja Bee" class="logo">
      <h1>Spelling Ninja</h1>
    </div>
    <p>Tap the cards to practice spelling.</p>
  </header>

  <div class="tabs">
    <button id="showAlphabet" class="tab active">Learn</button>
    <button id="showWords" class="tab">Practice</button>
  </div>

  <main class="container">
    <section class="panel" id="alphabetSection">
      <div class="section-badge">Alphabet Flip Cards</div>
      <div class="alphabet-tools">
        <div class="controls">
          <button id="flipAllLettersBtn" type="button">Flip all</button>
          <button id="resetLettersBtn" type="button">Reset</button>
        </div>
      </div>

      <div class="alphabet-grid" id="alphabetGrid"></div>
    </section>

    <section class="panel" id="wordSection">
      <div class="section-badge">Word Practice by Level</div>
      <div class="controls word-controls">
        <select id="levelSelect">
          <option value="all">All</option>
          <option value="a1">A1</option>
          <option value="a2">A2</option>
          <option value="b1">B1</option>
        </select>
        <button id="generateWordBtn" type="button">Generate word</button>
      </div>
      <div class="result-area">
        <div class="generated-wrap" id="generatedWrap"></div>
        <div class="legend">Say it, spell it, say it again.🔄</div>
      </div>
    </section>
  </main>

  <script>
    const alphabet = [
      { display: 'Aa', char: 'A', sound: '/ei/' },
      { display: 'Bb', char: 'B', sound: '/bi/' },
      { display: 'Cc', char: 'C', sound: '/si/' },
      { display: 'Dd', char: 'D', sound: '/di/' },
      { display: 'Ee', char: 'E', sound: '/i/' },
      { display: 'Ff', char: 'F', sound: '/ef/' },
      { display: 'Gg', char: 'G', sound: '/yi/' },
      { display: 'Hh', char: 'H', sound: '/eich/' },
      { display: 'Ii', char: 'I', sound: '/ai/' },
      { display: 'Jj', char: 'J', sound: '/yei/' },
      { display: 'Kk', char: 'K', sound: '/kei/' },
      { display: 'Ll', char: 'L', sound: '/el/' },
      { display: 'Mm', char: 'M', sound: '/em/' },
      { display: 'Nn', char: 'N', sound: '/en/' },
      { display: 'Oo', char: 'O', sound: '/ou/' },
      { display: 'Pp', char: 'P', sound: '/pi/' },
      { display: 'Qq', char: 'Q', sound: '/kiu/' },
      { display: 'Rr', char: 'R', sound: '/ar/' },
      { display: 'Ss', char: 'S', sound: '/es/' },
      { display: 'Tt', char: 'T', sound: '/ti/' },
      { display: 'Uu', char: 'U', sound: '/iu/' },
      { display: 'Vv', char: 'V', sound: '/vi/' },
      { display: 'Ww', char: 'W', sound: '/dábliu/' },
      { display: 'Xx', char: 'X', sound: '/eks/' },
      { display: 'Yy', char: 'Y', sound: '/uai/' },
      { display: 'Zz', char: 'Z', sound: '/zi/' }
    ];

    const letterMap = {
      A: 'ei',
      B: 'bi',
      C: 'si',
      D: 'di',
      E: 'i',
      F: 'ef',
      G: 'yi',
      H: 'eich',
      I: 'ai',
      J: 'yei',
      K: 'kei',
      L: 'el',
      M: 'em',
      N: 'en',
      O: 'ou',
      P: 'pi',
      Q: 'kiu',
      R: 'ar',
      S: 'es',
      T: 'ti',
      U: 'iu',
      V: 'vi',
      W: 'dábliu',
      X: 'eks',
      Y: 'uai',
      Z: 'zi'
    };

    const wordsByLevel = {
      a1: [
        'map','key','bag','cup','hat','pen','bed','box','toy','dish','coin','lock','rope','bell','nail','jar','lid','hook','mat','fan','tap','stick','leaf','seed','bone','stone','shell','bowl','brush','clock','gate','flag','card'
      ],
      a2: [
        'wallet','mirror','ladder','pillow','ticket','basket','button','carpet','bottle','helmet','suitcase','drawer','blanket','candle','bucket','handle','pocket','zipper','towel','sponge','receipt','tray','shelf','necklace','bracelet','suitcase','stamp','envelope','folder','calendar','battery','remote','speaker'
      ],
      b1: [
        'receipt','luggage','shelter','device','surface','evidence','engine','border','pattern','feature','resource','network','signal','impact','benefit','challenge','method','process','system','strategy','solution','context','concept','detail','issue','option','result','factor','element','function','role','trend','value'
      ]
    };

    const alphabetGrid = document.getElementById('alphabetGrid');
    const generatedWrap = document.getElementById('generatedWrap');
    const levelSelect = document.getElementById('levelSelect');
    const flipAllLettersBtn = document.getElementById('flipAllLettersBtn');
    const resetLettersBtn = document.getElementById('resetLettersBtn');
    const generateWordBtn = document.getElementById('generateWordBtn');

    function randomIndex(max) {
      return Math.floor(Math.random() * max);
    }

    function wordToSpelling(word) {
      const parts = word
        .toUpperCase()
        .split('')
        .map(letter => letterMap[letter] || letter.toLowerCase());

      return '/' + parts.join(' - ') + '/';
    }

    function createFlipCard(frontText, backText, extraClass = '') {
      const card = document.createElement('div');
      card.className = `flip-card ${extraClass}`.trim();
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `Flip card for ${frontText}`);

      const inner = document.createElement('div');
      inner.className = 'flip-card-inner';

      const front = document.createElement('div');
      front.className = `flip-face flip-front ${extraClass === 'word-card' ? 'word-front' : ''}`.trim();

      if (extraClass === 'word-card') {
        front.textContent = frontText;
      } else {
        front.innerHTML = `
          <div class="card-stack">
            <div class="card-main">${frontText}</div>
          </div>
        `;
      }

      const back = document.createElement('div');
      back.className = `flip-face flip-back ${extraClass === 'word-card' ? 'word-back' : ''}`.trim();

      if (extraClass === 'word-card') {
        back.innerHTML = `
          <div style="display:flex; flex-direction:column; gap:10px; align-items:center; justify-content:center;">
            <div style="font-size:1.4rem; font-weight:600;">${frontText}</div>
            <div style="font-size:1.6rem;">${backText}</div>
          </div>
        `;
      } else {
        back.innerHTML = `
          <div class="card-stack">
            <div class="card-main" style="font-size:clamp(1.3rem, 6vw, 1.8rem); font-weight:500;">${backText}</div>
          </div>
        `;
      }

      inner.appendChild(front);
      inner.appendChild(back);
      card.appendChild(inner);

      function toggleCard() {
        card.classList.toggle('flipped');
      }

      card.addEventListener('click', toggleCard);
      card.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleCard();
        }
      });

      return card;
    }

    function renderAlphabetCards() {
      alphabetGrid.innerHTML = '';
      alphabet.forEach(item => {
        const card = createFlipCard(item.char, item.sound);
        alphabetGrid.appendChild(card);
      });
    }

    function getWordsForLevel(level) {
      if (level === 'all') {
        return [...wordsByLevel.a1, ...wordsByLevel.a2, ...wordsByLevel.b1];
      }
      return wordsByLevel[level] ? [...wordsByLevel[level]] : [];
    }

    function renderGeneratedWord() {
      const selectedLevel = levelSelect.value;
      const words = getWordsForLevel(selectedLevel);

      generatedWrap.innerHTML = '';

      if (!words.length) {
        generatedWrap.textContent = 'No words available.';
        return;
      }

      const chosen = words[randomIndex(words.length)];
      const card = createFlipCard(chosen.toUpperCase(), wordToSpelling(chosen), 'word-card');
      generatedWrap.appendChild(card);
    }

    flipAllLettersBtn.addEventListener('click', function () {
      const cards = alphabetGrid.querySelectorAll('.flip-card');
      cards.forEach(card => card.classList.add('flipped'));
    });

    resetLettersBtn.addEventListener('click', function () {
      const cards = alphabetGrid.querySelectorAll('.flip-card');
      cards.forEach(card => card.classList.remove('flipped'));
    });

    generateWordBtn.addEventListener('click', function () {
      renderGeneratedWord();
    });

    const alphabetSection = document.getElementById('alphabetSection');
    const wordSection = document.getElementById('wordSection');
    const showAlphabet = document.getElementById('showAlphabet');
    const showWords = document.getElementById('showWords');

    showAlphabet.addEventListener('click', () => {
      alphabetSection.style.display = 'block';
      wordSection.style.display = 'none';
      showAlphabet.classList.add('active');
      showWords.classList.remove('active');
    });

    showWords.addEventListener('click', () => {
      alphabetSection.style.display = 'none';
      wordSection.style.display = 'block';
      showWords.classList.add('active');
      showAlphabet.classList.remove('active');
    });

    renderAlphabetCards();
    renderGeneratedWord();
    wordSection.style.display = 'none';
  </script>

  <footer class="footer">
  <p>Every letter you spell builds your voice in English.💛<br><br>By Ninja Master Omar Mogollón 🥷</p>
  </footer>
</body>
</html>
